<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перехід до принтера...</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f9; color: #333; }
    </style>
</head>
<body>
    <h2>Відкриваємо додаток принтера...</h2>
    <p>Будь ласка, зачекайте.</p>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const encodedText = getQueryParam('text');
        if (encodedText) {
            // Просто робимо редирект в додаток, передаючи текст у посиланні
            window.location.href = "myprinter://print?text=" + encodeURIComponent(encodedText);
        }
    </script>
</body>
</html>
